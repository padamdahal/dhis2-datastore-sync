<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Datastore Sync</title>
	<link rel="stylesheet" href="css/style.css">
	<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
	<style>
		:root {
			--primary: #1976d2;
			--primary-hover: #1565c0;
			--success: #2e7d32;
			--border: #dfe3e8;
			--background: #f5f7fa;
			--card: #ffffff;
			--text: #212121;
			--muted: #6b7280;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			padding: 30px;
			background: var(--background);
			font-family: "Roboto", Arial, sans-serif;
			color: var(--text);
		}

		.container {
			max-width: 1000px;
			margin: auto;
		}

		.header {
			margin-bottom: 20px;
		}

		.header h1 {
			margin: 0;
			font-size: 28px;
			font-weight: 500;
		}

		.header p {
			color: var(--muted);
			margin-top: 5px;
		}

		.card {
			background: var(--card);
			border-radius: 8px;
			box-shadow: 0 2px 10px rgba(0,0,0,.08);
			padding: 24px;
			margin-bottom: 20px;
		}

		.form-group {
			margin-bottom: 16px;
		}

		label {
			display: inline-block;
			margin-bottom: 6px;
			font-weight: 500;
			width:150px !important;
		}

		input {
			display: inline-block !important;
			padding: 10px 12px;
			border: 1px solid var(--border);
			border-radius: 4px;
			font-size: 14px;
		}

		input:focus {
			outline: none;
			border-color: var(--primary);
		}

		button {
			background: var(--primary);
			color: white;
			border: none;
			border-radius: 4px;
			padding: 10px 18px;
			cursor: pointer;
			font-size: 14px;
			font-weight: 500;
		}

		button:hover {
			background: var(--primary-hover);
		}

		button:disabled {
			opacity: .5;
			cursor: not-allowed;
		}

		.status-bar {
			display: flex;
			gap: 15px;
			margin-bottom: 15px;
		}

		.stat {
			flex: 1;
			background: #fafafa;
			border: 1px solid var(--border);
			border-radius: 6px;
			padding: 12px;
		}

		.stat-value {
			font-size: 22px;
			font-weight: bold;
		}

		.stat-label {
			color: var(--muted);
			font-size: 13px;
		}

		#log {
			background: #111827;
			color: #e5e7eb;
			border-radius: 6px;
			padding: 15px;
			height: 450px;
			overflow-y: auto;
			font-family: Consolas, monospace;
			font-size: 13px;
			line-height: 1.5;
		}

		.log-success {
			color: #4ade80;
		}

		.log-warning {
			color: #fbbf24;
		}

		.log-error {
			color: #f87171;
		}

		.progress {
			width: 100%;
			height: 10px;
			background: #e5e7eb;
			border-radius: 20px;
			overflow: hidden;
			margin: 15px 0;
		}

		.progress-bar {
			height: 100%;
			width: 0%;
			background: var(--success);
			transition: width .3s ease;
		}
	</style>
</head>
<body>
	<div class="container">
		<div class="header">
			<h1>DHIS2 Datastore Sync</h1>
			<p>Synchronize datastore namespaces and keys from a master DHIS2 instance.</p>
		</div>
		<div class="card">
			<div class="form-group">
				<label>Master URL</label>
				<input id="masterUrl">
			</div>
			<div class="form-group">
				<label>Username</label>
				<input id="username">
			</div>
			<div class="form-group">
				<label>Password</label>
				<input id="password" type="password">
			</div>
			<!--div class="form-group">
				<label>Local URL</label>
				<input id="localUrl" placeholder="https://local.dhis2.org/path">
			</div-->
			<button id="syncBtn">
				Start Synchronization
			</button>
		</div>

		<div class="card">
			<!--div class="status-bar">
				<div class="stat">
					<div class="stat-value" id="createdCount">0</div>
					<div class="stat-label">Created</div>
				</div>
				<div class="stat">
					<div class="stat-value" id="updatedCount">0</div>
					<div class="stat-label">Updated</div>
				</div>
				<div class="stat">
					<div class="stat-value" id="errorCount">0</div>
					<div class="stat-label">Errors</div>
				</div>
			</div>

			<div class="progress">
				<div class="progress-bar" id="progressBar"></div>
			</div-->
			<pre id="log"></pre>
		</div>
	</div>
	<script src="js/app.js"></script>
</body>
</html>
